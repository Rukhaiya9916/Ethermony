<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETHERMONY | The Unified Study Ecosystem</title>
  
  <link rel="icon" type="image/jpeg" href="ETHERMONY.jpeg">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Spline 3D Viewer Web Component -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.9/build/spline-viewer.js"></script>
  
  <!-- React, Babel, and Framer Motion -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

  <!-- Tailwind Config & Custom Animations -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#030712', 
            foreground: '#f9fafb',
            primary: '#8b5cf6', 
          },
          animation: {
            "fade-in-up": "fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards",
            "fade-in": "fadeIn 0.4s ease forwards",
            "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
          },
          keyframes: {
            fadeInUp: {
              "0%": { opacity: 0, transform: "translateY(20px)" },
              "100%": { opacity: 1, transform: "translateY(0)" },
            },
            fadeIn: {
              "0%": { opacity: 0 },
              "100%": { opacity: 1 },
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #030712; color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; margin: 0; padding: 0; }
    
    spline-viewer::part(logo) { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    spline-viewer::part(watermark) { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    
    .spline-watermark-clip {
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 70px), calc(100% - 200px) calc(100% - 70px), calc(100% - 200px) 100%, 0 100%);
    }

    .glass-nav {
      background: rgba(3, 7, 18, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    /* Custom Scrollbar for Workspace */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;
    const { motion } = window.Motion;

    // --- UTILITIES ---
    const cn = (...classes) => classes.filter(Boolean).join(' ');

    // --- ICONS ---
    const Icon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Brain = ({ className }) => <Icon className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5A3 3 0 0 0 13.6 4"/><path d="M6.401 6.5A3 3 0 0 1 10.4 4"/></Icon>;
    const Sparkles = ({ className }) => <Icon className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
    const Mail = ({ className }) => <Icon className={className}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></Icon>;
    const Lock = ({ className }) => <Icon className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Icon>;
    const UserIcon = ({ className }) => <Icon className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></Icon>;
    const PhoneIcon = ({ className }) => <Icon className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
    const ArrowLeft = ({ className }) => <Icon className={className}><path d="m15 18-6-6 6-6"/></Icon>;
    const LayoutDashboard = ({ className }) => <Icon className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Icon>;
    const MessageSquare = ({ className }) => <Icon className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const Users = ({ className }) => <Icon className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const LogOut = ({ className }) => <Icon className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
    const Send = ({ className }) => <Icon className={className}><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Icon>;
    const PlayCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></Icon>;
    const FileQuestion = ({ className }) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><circle cx="12" cy="17" r="1"/><path d="M12 13v-1c0-1 1.5-1.5 2-2.5a2 2 0 1 0-4 0"/></Icon>;

    const GoogleIcon = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
      </svg>
    );

    // --- NEW: REUSABLE ETHERMONY LOGO COMPONENT ---
    const EthermonyLogo = ({ className = "w-8 h-8", fallbackSize = "w-5 h-5" }) => (
      <div className={cn("flex items-center justify-center bg-white/5 border border-white/10 shadow-inner overflow-hidden relative", className)}>
        <img 
          src="ETHERMONY.jpeg" 
          alt="ETHERMONY Logo" 
          className="w-full h-full object-cover relative z-10" 
          onError={(e) => { e.target.style.display = 'none'; e.target.nextElementSibling.style.display = 'block'; }}
        />
        <Brain className={cn("text-white absolute hidden z-0", fallbackSize)} />
      </div>
    );

    // --- GEOMETRIC BACKGROUND SHAPES (Hero Only) ---
    function ElegantShape({ className, delay = 0, width = 400, height = 100, rotate = 0, gradient = "from-white/[0.08]" }) {
      return (
        <motion.div
          initial={{ opacity: 0, y: -150, rotate: rotate - 15 }}
          animate={{ opacity: 1, y: 0, rotate: rotate }}
          transition={{ duration: 2.4, delay, ease: [0.23, 0.86, 0.39, 0.96], opacity: { duration: 1.2 } }}
          className={cn("absolute", className)}
        >
          <motion.div animate={{ y: [0, 15, 0] }} transition={{ duration: 12, repeat: Infinity, ease: "easeInOut" }} style={{ width, height }} className="relative">
            <div className={cn("absolute inset-0 rounded-full bg-gradient-to-r to-transparent", gradient, "backdrop-blur-[2px] border-2 border-white/[0.15] shadow-[0_8px_32px_0_rgba(255,255,255,0.1)] after:absolute after:inset-0 after:rounded-full after:bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.2),transparent_70%)]")} />
          </motion.div>
        </motion.div>
      );
    }

    // --- FULL SCREEN HERO SCENE ---
    const SplineSceneBasic = () => {
      const phrases = ["A Unified Study Ecosystem", "Your AI Learning Hub", "Zero Tabs, Infinite Focus", "Eliminate Fragmentation"];
      const [currentPhraseIndex, setCurrentPhraseIndex] = useState(0);
      const [currentText, setCurrentText] = useState("");
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => {
          const fullText = phrases[currentPhraseIndex];
          if (!isDeleting && currentText === fullText) {
            setTimeout(() => setIsDeleting(true), 2000);
          } else if (isDeleting && currentText === "") {
            setIsDeleting(false);
            setCurrentPhraseIndex((prev) => (prev + 1) % phrases.length);
          } else {
            setCurrentText(isDeleting ? fullText.substring(0, currentText.length - 1) : fullText.substring(0, currentText.length + 1));
          }
        }, isDeleting ? 30 : 80);
        return () => clearTimeout(timer);
      }, [currentText, isDeleting, currentPhraseIndex]);

      return (
        <div className="w-full h-screen relative overflow-hidden flex flex-col">
          <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/[0.05] via-transparent to-rose-500/[0.05] blur-3xl pointer-events-none" />
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <ElegantShape delay={0.3} width={600} height={140} rotate={12} gradient="from-indigo-500/[0.15]" className="left-[-10%] md:left-[-5%] top-[15%] md:top-[20%]" />
            <ElegantShape delay={0.5} width={500} height={120} rotate={-15} gradient="from-rose-500/[0.15]" className="right-[-5%] md:right-[0%] top-[70%] md:top-[75%]" />
            <ElegantShape delay={0.4} width={300} height={80} rotate={-8} gradient="from-violet-500/[0.15]" className="left-[5%] md:left-[10%] bottom-[5%] md:bottom-[10%]" />
          </div>

          <div className="absolute inset-0 w-full h-full z-0 pointer-events-auto md:translate-x-[15%] lg:translate-x-[20%] transition-transform duration-700">
            <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode" class="w-full h-full spline-watermark-clip"></spline-viewer>
          </div>
          
          <div className="absolute inset-0 bg-gradient-to-t from-[#030712] via-transparent to-[#030712]/80 pointer-events-none z-0" />

          <div className="relative z-10 w-full h-full flex flex-col justify-center px-8 md:px-16 lg:px-24 max-w-3xl pointer-events-none pt-16">
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/40 border border-white/10 text-xs font-medium text-neutral-300 w-fit mb-6 animate-fade-in-up pointer-events-auto backdrop-blur-md">
              <Sparkles className="w-3.5 h-3.5 text-primary" /> AI-Powered Study Engine
            </div>
            <h3 className="text-4xl md:text-5xl lg:text-7xl font-bold leading-tight animate-fade-in-up min-h-[100px] md:min-h-[120px] lg:min-h-[160px]" style={{ animationDelay: "0.1s" }}>
              <span className="bg-clip-text text-transparent bg-gradient-to-b from-neutral-50 to-neutral-400">{currentText}</span>
              <span className="inline-block w-[3px] h-[0.9em] bg-primary ml-2 animate-pulse align-middle"></span>
            </h3>
            <p className="mt-4 md:mt-6 text-neutral-400 max-w-md text-base md:text-lg leading-relaxed animate-fade-in-up drop-shadow-md" style={{ animationDelay: "0.2s" }}>
              Transform scattered learning into a guided, immersive experience. Get structured AI explanations, instant video resources, and focused summaries—all in one calm space.
            </p>
          </div>
        </div>
      );
    };

    // --- NEW: AUTHENTICATION PAGE WITH PHONE LOGIN SEPARATION ---
    const AuthPage = ({ onBack, onLoginSuccess, initialMode }) => {
      // isLogin: True = Login, False = Sign Up
      const [isLogin, setIsLogin] = useState(initialMode === 'login');
      // authMethod: 'email' or 'phone'
      const [authMethod, setAuthMethod] = useState('email');

      return (
        <div className="w-full h-screen absolute inset-0 z-[100] flex items-center justify-center p-6 bg-[#030712] overflow-hidden animate-fade-in">
          
          {/* Subtle static radial glow */}
          <div className="absolute top-[-20%] right-[-10%] w-[70%] h-[70%] bg-[radial-gradient(ellipse_at_center,_#4a154b_0%,_#2d0f41_40%,_transparent_70%)] opacity-80 pointer-events-none"></div>
          <div className="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-[radial-gradient(ellipse_at_center,_#1c103f_0%,_transparent_70%)] opacity-60 pointer-events-none"></div>

          {/* Back Button */}
          <button onClick={onBack} className="absolute top-8 left-8 flex items-center gap-2 text-white/80 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full backdrop-blur-md border border-white/10 z-20">
            <ArrowLeft className="w-4 h-4" /> Back
          </button>

          {/* Glassmorphism Auth Card */}
          <div className="w-full max-w-md bg-[#0a0514]/60 backdrop-blur-2xl border border-white/10 p-8 md:p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] relative z-10">
            
            <div className="text-center mb-8">
              <EthermonyLogo className="w-14 h-14 rounded-2xl mx-auto mb-4 border-purple-500/30" fallbackSize="w-8 h-8" />
              <h2 className="text-3xl font-bold text-white tracking-tight">{isLogin ? 'Welcome Back' : 'Create Account'}</h2>
              <p className="text-white/60 text-sm mt-2">
                {isLogin ? 'Log in to your unified study space' : 'Join ETHERMONY and master your focus'}
              </p>
            </div>

            {/* FLOW 1: EMAIL / PASSWORD */}
            {authMethod === 'email' && (
              <form className="space-y-4 animate-fade-in" onSubmit={(e) => { e.preventDefault(); onLoginSuccess(); }}>
                
                {!isLogin && (
                  <div className="relative group">
                    <UserIcon className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40 group-focus-within:text-white transition-colors" />
                    <input type="text" placeholder="Full Name" required className="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-white/40 focus:outline-none focus:border-purple-500/50 transition-all" />
                  </div>
                )}

                <div className="relative group">
                  <Mail className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40 group-focus-within:text-white transition-colors" />
                  <input type="email" placeholder="Email Address" required className="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-white/40 focus:outline-none focus:border-purple-500/50 transition-all" />
                </div>

                <div className="relative group">
                  <Lock className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40 group-focus-within:text-white transition-colors" />
                  <input type="password" placeholder="Password" required className="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-white/40 focus:outline-none focus:border-purple-500/50 transition-all" />
                </div>

                {isLogin && (
                  <div className="flex justify-end pt-1">
                    <a href="#" className="text-xs text-white/60 hover:text-white transition-colors">Forgot password?</a>
                  </div>
                )}

                <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold rounded-xl py-3.5 mt-4 transition-all shadow-[0_0_20px_rgba(168,85,247,0.3)] active:scale-[0.98]">
                  {isLogin ? 'Log In' : 'Sign Up'}
                </button>

                <div className="relative flex items-center py-2">
                  <div className="flex-grow border-t border-white/10"></div>
                  <span className="flex-shrink-0 mx-4 text-white/40 text-xs uppercase tracking-wider">or</span>
                  <div className="flex-grow border-t border-white/10"></div>
                </div>

                <div className="grid grid-cols-1 gap-3">
                  <button type="button" onClick={onLoginSuccess} className="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl py-3 px-4 font-medium flex items-center justify-center gap-3 transition-colors active:scale-[0.98]">
                    <GoogleIcon className="w-5 h-5" />
                    Continue with Google
                  </button>
                  <button type="button" onClick={() => setAuthMethod('phone')} className="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl py-3 px-4 font-medium flex items-center justify-center gap-3 transition-colors active:scale-[0.98]">
                    <PhoneIcon className="w-5 h-5 text-gray-300" />
                    Continue with Phone
                  </button>
                </div>
              </form>
            )}

            {/* FLOW 2: PHONE OTP */}
            {authMethod === 'phone' && (
              <form className="space-y-4 animate-fade-in" onSubmit={(e) => { e.preventDefault(); onLoginSuccess(); }}>
                <p className="text-sm text-gray-400 text-center mb-4">We'll send a code to verify your number.</p>
                <div className="relative group">
                  <PhoneIcon className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40 group-focus-within:text-white transition-colors" />
                  <input type="tel" placeholder="+1 (555) 000-0000" required className="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-white/40 focus:outline-none focus:border-purple-500/50 transition-all font-mono" />
                </div>
                
                <button type="submit" className="w-full bg-white text-black font-semibold rounded-xl py-3.5 mt-4 hover:bg-gray-200 transition-colors shadow-lg active:scale-[0.98]">
                  Send Verification Code
                </button>

                <div className="mt-4 text-center">
                  <button type="button" onClick={() => setAuthMethod('email')} className="text-sm text-purple-400 hover:text-purple-300 transition-colors font-medium">
                    ← Back to Email
                  </button>
                </div>
              </form>
            )}

            {/* Toggle Login/Signup (Only visible on Email flow to avoid confusion during OTP) */}
            {authMethod === 'email' && (
              <p className="text-center mt-8 text-sm text-white/60">
                {isLogin ? "Don't have an account? " : "Already have an account? "}
                <button onClick={() => setIsLogin(!isLogin)} className="text-purple-400 font-semibold hover:text-purple-300 transition-colors">
                  {isLogin ? 'Sign up' : 'Log in'}
                </button>
              </p>
            )}
          </div>
        </div>
      );
    }

    // --- WORKSPACE COMPONENTS ---

    const StudyChatFeature = () => {
      const [prompt, setPrompt] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [hasResult, setHasResult] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!prompt.trim()) return;
        setIsLoading(true);
        setHasResult(false);
        setTimeout(() => {
          setIsLoading(false);
          setHasResult(true);
        }, 2500);
      };

      return (
        <div className="flex flex-col h-full max-w-5xl mx-auto animate-fade-in-up">
          <div className="mb-8">
            <h2 className="text-2xl font-bold text-white mb-2">Study & Research Engine</h2>
            <p className="text-gray-400 text-sm">Ask a question. ETHERMONY will generate an explanation, fetch video resources, and create a custom quiz.</p>
          </div>

          <div className="bg-white/[0.03] border border-white/10 rounded-2xl p-2 mb-8 shadow-lg focus-within:border-purple-500/50 transition-colors">
            <form onSubmit={handleSubmit} className="flex items-center relative">
              <div className="p-2">
                <EthermonyLogo className="w-8 h-8 rounded-lg" fallbackSize="w-5 h-5" />
              </div>
              <input 
                type="text" 
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="E.g., Explain the theory of relativity simply..." 
                className="flex-grow bg-transparent border-none text-white placeholder-gray-500 focus:outline-none py-3 px-2"
              />
              <button disabled={isLoading} type="submit" className="bg-purple-600 hover:bg-purple-500 text-white p-3 rounded-xl transition-colors disabled:opacity-50">
                {isLoading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Send className="w-5 h-5" />}
              </button>
            </form>
          </div>

          <div className="flex-grow overflow-y-auto pr-2 pb-10 space-y-10">
            {!hasResult && !isLoading && (
              <div className="h-full flex flex-col items-center justify-center text-center opacity-50 pt-20">
                <Sparkles className="w-12 h-12 text-gray-400 mb-4" />
                <p className="text-gray-400">Your generated study materials will appear here.</p>
              </div>
            )}

            {isLoading && (
              <div className="space-y-8 animate-pulse">
                <div className="h-40 bg-white/5 rounded-2xl border border-white/5"></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div className="h-24 bg-white/5 rounded-2xl"></div><div className="h-24 bg-white/5 rounded-2xl"></div></div>
                <div className="h-64 bg-white/5 rounded-2xl"></div>
              </div>
            )}

            {hasResult && !isLoading && (
              <div className="space-y-8 animate-fade-in-up">
                
                {/* AI Explanation */}
                <div className="bg-white/[0.03] border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>
                  <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-3">
                    <EthermonyLogo className="w-6 h-6 rounded-md" fallbackSize="w-4 h-4" /> Core Explanation
                  </h3>
                  <div className="text-gray-300 text-sm leading-relaxed space-y-4">
                    <p><strong>Relativity</strong> is basically the idea that the laws of physics are the same for everyone, regardless of how fast they are moving, as long as they aren't accelerating. It was formulated by Albert Einstein.</p>
                    <p>There are two parts: <em>Special Relativity</em> (which deals with speed and time dilation) and <em>General Relativity</em> (which explains gravity as the warping of space and time).</p>
                    <ul className="list-disc pl-5 space-y-1 text-gray-400">
                      <li><strong>E=mc²:</strong> Energy equals mass times the speed of light squared.</li>
                      <li><strong>Time Dilation:</strong> Time moves slower the faster you go.</li>
                    </ul>
                  </div>
                </div>

                {/* YouTube Resources */}
                <div>
                  <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <PlayCircle className="w-5 h-5 text-red-400" /> Curated Video Lectures
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {[1, 2, 3].map((i) => (
                      <div key={i} className="bg-white/5 border border-white/10 rounded-xl overflow-hidden group cursor-pointer hover:border-purple-500/50 transition-all">
                        <div className="h-32 bg-gray-800 relative">
                          <div className="absolute inset-0 bg-gradient-to-br from-indigo-900 to-purple-900 opacity-60"></div>
                          <PlayCircle className="w-10 h-10 text-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-80 group-hover:scale-110 transition-transform" />
                          <span className="absolute bottom-2 right-2 bg-black/80 text-xs px-1.5 py-0.5 rounded text-white font-mono">12:4{i}</span>
                        </div>
                        <div className="p-4">
                          <h4 className="text-sm font-semibold text-white line-clamp-2 mb-1">Theory of Relativity EXPLAINED in {i * 5} Minutes</h4>
                          <p className="text-xs text-gray-500">Science Channel • {i}M views</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Quizzes */}
                <div>
                  <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <FileQuestion className="w-5 h-5 text-blue-400" /> Knowledge Check (Easy to Hard)
                  </h3>
                  <div className="space-y-3">
                    {[
                      { q: "What does the 'c' in E=mc² stand for?", diff: "Easy", color: "text-green-400 bg-green-400/10" },
                      { q: "Who developed the theory of relativity?", diff: "Easy", color: "text-green-400 bg-green-400/10" },
                      { q: "Which part of relativity deals with gravity?", diff: "Medium", color: "text-yellow-400 bg-yellow-400/10" },
                      { q: "Explain the concept of time dilation.", diff: "Medium", color: "text-yellow-400 bg-yellow-400/10" },
                      { q: "How does mass affect spacetime according to General Relativity?", diff: "Hard", color: "text-red-400 bg-red-400/10" }
                    ].map((quiz, i) => (
                      <div key={i} className="bg-white/[0.02] border border-white/5 rounded-xl p-4 flex items-start gap-4 hover:bg-white/[0.04] transition-colors cursor-pointer group">
                        <div className="flex-shrink-0 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm font-bold text-gray-400 group-hover:text-white transition-colors">
                          {i + 1}
                        </div>
                        <div className="flex-grow">
                          <p className="text-sm text-gray-300 group-hover:text-white transition-colors">{quiz.q}</p>
                        </div>
                        <span className={`text-[10px] uppercase font-bold px-2 py-1 rounded border border-white/5 ${quiz.color}`}>
                          {quiz.diff}
                        </span>
                      </div>
                    ))}
                    <div className="text-center py-2 text-sm text-purple-400 cursor-pointer hover:underline">
                      + View 5 more advanced questions
                    </div>
                  </div>
                </div>

              </div>
            )}
          </div>
        </div>
      );
    };

    const StudyRoomsFeature = () => {
      const messages = [
        { sender: 'Alex', text: 'Does anyone understand how the Krebs cycle actually works?', time: '10:02 AM', isMe: false },
        { sender: 'ETHERMONY AI', isBot: true, text: 'The Krebs cycle (or Citric Acid Cycle) is a series of chemical reactions used by all aerobic organisms to release stored energy. It takes place in the mitochondria. Would you like me to break down the 8 steps?', time: '10:02 AM' },
        { sender: 'Sarah', text: 'Yes please! Im struggling with the enzymes involved.', time: '10:04 AM', isMe: false },
        { sender: 'You', text: 'Specifically Step 3, the isocitrate part.', time: '10:05 AM', isMe: true },
      ];

      return (
        <div className="flex flex-col lg:flex-row h-[calc(100vh-120px)] gap-6 animate-fade-in-up">
          <div className="flex-grow flex flex-col bg-white/[0.02] border border-white/10 rounded-2xl overflow-hidden">
            <div className="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-white/[0.01]">
              <div>
                <h3 className="font-bold text-white flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-green-500"></div> Advanced Biology 101
                </h3>
                <p className="text-xs text-gray-400 font-mono tracking-wider">Room ID: BIO-X79K <span className="text-purple-400 cursor-pointer hover:underline">(Copy to invite)</span></p>
              </div>
              <div className="flex -space-x-2">
                {[1,2,3].map(i => <div key={i} className="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 border-2 border-[#030712]"></div>)}
              </div>
            </div>

            <div className="flex-grow overflow-y-auto p-6 space-y-6">
              {messages.map((msg, i) => (
                <div key={i} className={`flex flex-col max-w-[80%] ${msg.isMe ? 'ml-auto items-end' : 'items-start'}`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className={`text-xs font-medium flex items-center gap-1 ${msg.isBot ? 'text-primary' : 'text-gray-400'}`}>
                      {msg.isBot && <EthermonyLogo className="w-4 h-4 rounded-sm" fallbackSize="w-3 h-3" />} {msg.sender}
                    </span>
                    <span className="text-[10px] text-gray-600">{msg.time}</span>
                  </div>
                  <div className={`p-3 rounded-2xl text-sm leading-relaxed ${
                    msg.isMe 
                      ? 'bg-purple-600 text-white rounded-tr-none' 
                      : msg.isBot 
                        ? 'bg-primary/10 border border-primary/20 text-gray-200 rounded-tl-none shadow-[0_0_15px_rgba(139,92,246,0.1)]'
                        : 'bg-white/5 text-gray-300 border border-white/10 rounded-tl-none'
                  }`}>
                    {msg.text}
                  </div>
                </div>
              ))}
            </div>

            <div className="p-4 border-t border-white/10 bg-white/[0.01]">
              <div className="flex items-center gap-2 bg-black/40 border border-white/10 rounded-xl p-2 pr-2 focus-within:border-purple-500/50 transition-colors">
                <button className="p-2 text-purple-400 hover:text-purple-300 transition-colors" title="Trigger ETHERMONY AI">
                  <Sparkles className="w-5 h-5" />
                </button>
                <input type="text" placeholder="Message group or ask AI (@ai)..." className="flex-grow bg-transparent border-none text-sm text-white focus:outline-none" />
                <button className="bg-white text-black p-2 rounded-lg hover:bg-gray-200 transition-colors">
                  <Send className="w-4 h-4" />
                </button>
              </div>
            </div>
          </div>

          <div className="w-full lg:w-72 flex flex-col gap-6">
            <div className="bg-white/[0.02] border border-white/10 rounded-2xl p-5">
              <h4 className="text-sm font-bold text-white mb-4">Room Resources</h4>
              <div className="space-y-3">
                <div className="p-3 bg-white/5 rounded-xl text-xs text-gray-300 flex items-center gap-3 cursor-pointer hover:bg-white/10"><FileQuestion className="w-4 h-4 text-purple-400"/> Shared Notes Doc</div>
                <div className="p-3 bg-white/5 rounded-xl text-xs text-gray-300 flex items-center gap-3 cursor-pointer hover:bg-white/10"><PlayCircle className="w-4 h-4 text-blue-400"/> Lecture Recording</div>
              </div>
            </div>
            
            <div className="bg-white/[0.02] border border-white/10 rounded-2xl p-5 flex-grow">
              <h4 className="text-sm font-bold text-white mb-4">Active Members (3)</h4>
              <div className="space-y-4">
                {['Alex', 'Sarah', 'You'].map((name, i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-xs font-bold text-gray-400">{name[0]}</div>
                    <span className="text-sm text-gray-300">{name}</span>
                    <div className="ml-auto w-2 h-2 rounded-full bg-green-500"></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const Workspace = ({ onLogout }) => {
      const [activeTab, setActiveTab] = useState('study'); 

      return (
        <div className="w-full h-screen bg-[#030712] flex overflow-hidden absolute inset-0 z-[150] animate-fade-in">
          
          <div className="w-20 md:w-64 border-r border-white/10 bg-white/[0.02] flex flex-col">
            <div className="h-20 flex items-center justify-center md:justify-start md:px-6 border-b border-white/10">
              <div className="flex items-center gap-3">
                <EthermonyLogo className="w-8 h-8 rounded-lg shadow-lg shadow-primary/20" fallbackSize="w-5 h-5" />
                <span className="text-lg font-bold tracking-widest text-white hidden md:block">ETHERMONY</span>
              </div>
            </div>

            <div className="flex-grow py-8 flex flex-col gap-2 px-3">
              <button onClick={() => setActiveTab('study')} className={`flex items-center gap-3 px-3 py-3 md:px-4 rounded-xl transition-all ${activeTab === 'study' ? 'bg-primary/20 text-primary border border-primary/30' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                <MessageSquare className="w-5 h-5" /> <span className="hidden md:block text-sm font-medium">AI Study Chat</span>
              </button>
              
              <button onClick={() => setActiveTab('rooms')} className={`flex items-center gap-3 px-3 py-3 md:px-4 rounded-xl transition-all ${activeTab === 'rooms' ? 'bg-primary/20 text-primary border border-primary/30' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                <Users className="w-5 h-5" /> <span className="hidden md:block text-sm font-medium">Study Rooms</span>
              </button>

              <button className={`flex items-center gap-3 px-3 py-3 md:px-4 rounded-xl transition-all text-gray-600 cursor-not-allowed`}>
                <LayoutDashboard className="w-5 h-5" /> <span className="hidden md:block text-sm font-medium">Progress (Locked)</span>
              </button>
            </div>

            <div className="p-4 border-t border-white/10">
              <button onClick={onLogout} className="flex items-center justify-center md:justify-start gap-3 w-full px-3 py-3 text-red-400 hover:bg-red-400/10 rounded-xl transition-colors">
                <LogOut className="w-5 h-5" /> <span className="hidden md:block text-sm font-medium">Sign Out</span>
              </button>
            </div>
          </div>

          <div className="flex-grow flex flex-col relative">
            <div className="absolute top-[-20%] right-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
            
            <header className="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-transparent relative z-10">
              <h1 className="text-xl font-bold text-white">
                {activeTab === 'study' && "AI Study Engine"}
                {activeTab === 'rooms' && "Collaborative Network"}
              </h1>
              <div className="flex items-center gap-3">
                <div className="text-right hidden sm:block">
                  <p className="text-sm font-bold text-white">Student User</p>
                  <p className="text-xs text-primary font-mono">1,250 Harmony Pts</p>
                </div>
                <div className="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center">
                  <UserIcon className="w-5 h-5 text-gray-300" />
                </div>
              </div>
            </header>

            <div className="flex-grow overflow-hidden p-4 md:p-8 relative z-10">
              {activeTab === 'study' && <StudyChatFeature />}
              {activeTab === 'rooms' && <StudyRoomsFeature />}
            </div>
          </div>

        </div>
      );
    };

    // --- ROOT APP MANAGER ---
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [authMode, setAuthMode] = useState('login'); 

      const openAuth = (mode) => {
        setAuthMode(mode);
        setCurrentView('auth');
      };

      const handleLoginSuccess = () => {
        setCurrentView('workspace');
      };

      const handleLogout = () => {
        setCurrentView('home');
      };

      return (
        <div className="h-screen w-screen flex flex-col relative selection:bg-primary/30 selection:text-white bg-[#030712] overflow-hidden">
          
          {currentView !== 'workspace' && (
            <div className="absolute inset-0 z-10 w-full h-full">
              <nav className="fixed top-0 left-0 right-0 z-50 glass-nav h-16 pointer-events-none">
                <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
                  
                  {/* Reusable Logo Component Usage */}
                  <div className="flex items-center gap-3 cursor-pointer pointer-events-auto hover:opacity-80 transition-opacity" onClick={() => setCurrentView('home')}>
                    <EthermonyLogo className="w-8 h-8 rounded-lg shadow-lg shadow-primary/20" fallbackSize="w-5 h-5" />
                    <span className="text-lg font-bold tracking-widest text-white">ETHERMONY</span>
                  </div>
                  
                  <div className="flex items-center gap-4 pointer-events-auto">
                    <button onClick={() => openAuth('login')} className="text-sm font-medium text-neutral-300 hover:text-white transition-colors hidden sm:block cursor-pointer">
                      Log in
                    </button>
                    <button onClick={() => openAuth('signup')} className="bg-white text-black px-4 py-2 rounded-lg text-sm font-semibold hover:bg-neutral-200 transition-colors active:scale-95 cursor-pointer">
                      Sign Up
                    </button>
                  </div>
                </div>
              </nav>

              <main className="w-full h-full">
                <SplineSceneBasic />
              </main>
            </div>
          )}

          {currentView === 'auth' && (
            <AuthPage 
              onBack={() => setCurrentView('home')} 
              onLoginSuccess={handleLoginSuccess}
              initialMode={authMode} 
            />
          )}

          {currentView === 'workspace' && (
            <Workspace onLogout={handleLogout} />
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
