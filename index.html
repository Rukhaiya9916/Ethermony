<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETHERMONY | The Unified Study Ecosystem</title>
  
  <!-- FAVICON: Will automatically load ETHERMONY.jpeg when placed in the same folder -->
  <link rel="icon" type="image/jpeg" href="ETHERMONY.jpeg">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Spline 3D Viewer Web Component -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.9/build/spline-viewer.js"></script>
  
  <!-- React, Babel, and Framer Motion -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

  <!-- Tailwind Config & Custom Animations -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#030712', // Deep calm dark blue/black
            foreground: '#f9fafb',
            primary: '#8b5cf6', // Soft purple glow
          },
          animation: {
            "fade-in-up": "fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards",
          },
          keyframes: {
            fadeInUp: {
              "0%": { opacity: 0, transform: "translateY(20px)" },
              "100%": { opacity: 1, transform: "translateY(0)" },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Stop any scrolling, make it act like a pure fullscreen app */
    body { background-color: #030712; color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; margin: 0; padding: 0; }
    
    /* Attempt to hide Spline branding via Shadow DOM (works on some browsers) */
    spline-viewer::part(logo) { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    spline-viewer::part(watermark) { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    
    /* THE ULTIMATE HACK: This clips out the bottom right 200x70 rectangle of the canvas, 
       removing the watermark physically while letting background shapes show through! */
    .spline-watermark-clip {
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 70px), calc(100% - 200px) calc(100% - 70px), calc(100% - 200px) 100%, 0 100%);
    }

    .glass-nav {
      background: rgba(3, 7, 18, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;
    // Extract Framer Motion from the CDN
    const { motion } = window.Motion;

    // --- UTILITIES ---
    const cn = (...classes) => classes.filter(Boolean).join(' ');

    // --- ICONS (Lucide alternatives) ---
    const Icon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Brain = ({ className }) => <Icon className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5A3 3 0 0 0 13.6 4"/><path d="M6.401 6.5A3 3 0 0 1 10.4 4"/></Icon>;
    const Sparkles = ({ className }) => <Icon className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;

    // --- ELEGANT GEOMETRIC BACKGROUND SHAPES ---
    function ElegantShape({ className, delay = 0, width = 400, height = 100, rotate = 0, gradient = "from-white/[0.08]" }) {
      return (
        <motion.div
          initial={{ opacity: 0, y: -150, rotate: rotate - 15 }}
          animate={{ opacity: 1, y: 0, rotate: rotate }}
          transition={{ duration: 2.4, delay, ease: [0.23, 0.86, 0.39, 0.96], opacity: { duration: 1.2 } }}
          className={cn("absolute", className)}
        >
          <motion.div
            animate={{ y: [0, 15, 0] }}
            transition={{ duration: 12, repeat: Infinity, ease: "easeInOut" }}
            style={{ width, height }}
            className="relative"
          >
            <div
              className={cn(
                "absolute inset-0 rounded-full",
                "bg-gradient-to-r to-transparent",
                gradient,
                "backdrop-blur-[2px] border-2 border-white/[0.15]",
                "shadow-[0_8px_32px_0_rgba(255,255,255,0.1)]",
                "after:absolute after:inset-0 after:rounded-full",
                "after:bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.2),transparent_70%)]"
              )}
            />
          </motion.div>
        </motion.div>
      );
    }

    // --- FULL SCREEN HERO SCENE ---
    const SplineSceneBasic = () => {
      // Typewriter State Logic
      const phrases = [
        "A Unified Study Ecosystem",
        "Your AI Learning Hub",
        "Zero Tabs, Infinite Focus",
        "Eliminate Fragmentation"
      ];
      const [currentPhraseIndex, setCurrentPhraseIndex] = useState(0);
      const [currentText, setCurrentText] = useState("");
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const typingSpeed = isDeleting ? 30 : 80;
        const pauseTime = 2000;
        
        const handleTyping = () => {
          const fullText = phrases[currentPhraseIndex];
          if (!isDeleting && currentText === fullText) {
            setTimeout(() => setIsDeleting(true), pauseTime);
          } else if (isDeleting && currentText === "") {
            setIsDeleting(false);
            setCurrentPhraseIndex((prev) => (prev + 1) % phrases.length);
          } else {
            setCurrentText(isDeleting 
              ? fullText.substring(0, currentText.length - 1)
              : fullText.substring(0, currentText.length + 1));
          }
        };

        const timer = setTimeout(handleTyping, typingSpeed);
        return () => clearTimeout(timer);
      }, [currentText, isDeleting, currentPhraseIndex]);

      return (
        <div className="w-full h-screen relative overflow-hidden flex flex-col">
          
          {/* 1. Animated Geometric Background */}
          <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/[0.05] via-transparent to-rose-500/[0.05] blur-3xl pointer-events-none" />
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <ElegantShape delay={0.3} width={600} height={140} rotate={12} gradient="from-indigo-500/[0.15]" className="left-[-10%] md:left-[-5%] top-[15%] md:top-[20%]" />
            <ElegantShape delay={0.5} width={500} height={120} rotate={-15} gradient="from-rose-500/[0.15]" className="right-[-5%] md:right-[0%] top-[70%] md:top-[75%]" />
            <ElegantShape delay={0.4} width={300} height={80} rotate={-8} gradient="from-violet-500/[0.15]" className="left-[5%] md:left-[10%] bottom-[5%] md:bottom-[10%]" />
            <ElegantShape delay={0.6} width={200} height={60} rotate={20} gradient="from-amber-500/[0.15]" className="right-[15%] md:right-[20%] top-[10%] md:top-[15%]" />
            <ElegantShape delay={0.7} width={150} height={40} rotate={-25} gradient="from-cyan-500/[0.15]" className="left-[20%] md:left-[25%] top-[5%] md:top-[10%]" />
          </div>

          {/* 2. Interactive 3D Robot (Sits on top of the shapes) */}
          <div className="absolute inset-0 w-full h-full z-0 pointer-events-auto md:translate-x-[15%] lg:translate-x-[20%] transition-transform duration-700">
            <spline-viewer 
              url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode" 
              class="w-full h-full spline-watermark-clip"
            ></spline-viewer>
          </div>
          
          {/* Subtle Vignette Overlay for Depth */}
          <div className="absolute inset-0 bg-gradient-to-t from-[#030712] via-transparent to-[#030712]/80 pointer-events-none z-0" />

          {/* 3. Floating Text Content on the Left */}
          <div className="relative z-10 w-full h-full flex flex-col justify-center px-8 md:px-16 lg:px-24 max-w-3xl pointer-events-none pt-16">
            
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/40 border border-white/10 text-xs font-medium text-neutral-300 w-fit mb-6 animate-fade-in-up pointer-events-auto backdrop-blur-md">
              <Sparkles className="w-3.5 h-3.5 text-primary" /> AI-Powered Study Engine
            </div>
            
            {/* Typewriter Container - Fixed min height prevents layout jumping */}
            <h3 className="text-4xl md:text-5xl lg:text-7xl font-bold leading-tight animate-fade-in-up min-h-[100px] md:min-h-[120px] lg:min-h-[160px]" style={{ animationDelay: "0.1s" }}>
              <span className="bg-clip-text text-transparent bg-gradient-to-b from-neutral-50 to-neutral-400">
                {currentText}
              </span>
              <span className="inline-block w-[3px] h-[0.9em] bg-primary ml-2 animate-pulse align-middle"></span>
            </h3>
            
            <p className="mt-4 md:mt-6 text-neutral-400 max-w-md text-base md:text-lg leading-relaxed animate-fade-in-up drop-shadow-md" style={{ animationDelay: "0.2s" }}>
              Transform scattered learning into a guided, immersive experience. Get structured AI explanations, instant video resources, and focused summaries—all in one calm space.
            </p>
            
            {/* CTA Buttons */}
            <div className="mt-8 flex flex-wrap items-center gap-4 animate-fade-in-up pointer-events-auto" style={{ animationDelay: "0.3s" }}>
              <button className="px-6 py-3 rounded-xl bg-white text-black font-semibold hover:bg-neutral-200 transition-all active:scale-95 cursor-pointer flex items-center gap-2">
                Enter Workspace
              </button>
              <button className="px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-white font-medium hover:bg-white/10 transition-all active:scale-95 backdrop-blur-sm cursor-pointer">
                Discover Features
              </button>
            </div>
          </div>

        </div>
      );
    };

    // --- MAIN APP ---
    function App() {
      return (
        <div className="h-screen w-screen flex flex-col relative selection:bg-primary/30 selection:text-white bg-[#030712] overflow-hidden">
          
          {/* Navigation */}
          <nav className="fixed top-0 left-0 right-0 z-50 glass-nav h-16 pointer-events-none">
            <div className="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
              
              {/* Logo - Connects to ETHERMONY.jpeg */}
              <div className="flex items-center gap-3 cursor-pointer pointer-events-auto hover:opacity-80 transition-opacity">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-lg shadow-primary/20 overflow-hidden bg-white/5 border border-white/10 relative">
                  {/* Tries to load ETHERMONY.jpeg. If it fails, falls back to the Brain icon via the onError handler */}
                  <img 
                    src="ETHERMONY.jpeg" 
                    alt="ETHERMONY Logo" 
                    className="w-full h-full object-cover relative z-10" 
                    onError={(e) => { e.target.style.display = 'none'; e.target.nextElementSibling.style.display = 'block'; }}
                  />
                  <Brain className="w-5 h-5 text-white absolute hidden" />
                </div>
                <span className="text-lg font-bold tracking-widest text-white">ETHERMONY</span>
              </div>
              
              {/* Links */}
              <div className="hidden md:flex items-center gap-8 text-sm font-medium text-neutral-400 pointer-events-auto">
                <a href="#" className="hover:text-white transition-colors cursor-pointer">Features</a>
                <a href="#" className="hover:text-white transition-colors cursor-pointer">Study Rooms</a>
                <a href="#" className="hover:text-white transition-colors cursor-pointer">Leaderboard</a>
              </div>
              
              {/* Auth Buttons */}
              <div className="flex items-center gap-4 pointer-events-auto">
                <button className="text-sm font-medium text-neutral-300 hover:text-white transition-colors hidden sm:block cursor-pointer">Log in</button>
                <button className="bg-white text-black px-4 py-2 rounded-lg text-sm font-semibold hover:bg-neutral-200 transition-colors active:scale-95 cursor-pointer">
                  Get Started
                </button>
              </div>

            </div>
          </nav>

          {/* Main Content Render */}
          <main className="flex-grow relative z-10 flex flex-col w-full h-full">
            <div className="w-full h-full flex flex-col opacity-0" style={{ animation: "fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards" }}>
              <SplineSceneBasic />
            </div>
          </main>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
